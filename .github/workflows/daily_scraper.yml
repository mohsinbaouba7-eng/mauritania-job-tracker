name: Daily Job Market Scraper Cron

on:
  schedule:
    # This instructs GitHub to run your scraper automatically every single day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # This adds a manual "Run" button in GitHub so you can test it anytime

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository code
        uses: actions/checkout@v4

      - name: Setup cloud Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install required scraping packages
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Execute your scraping engine
        run: python scraper.py

      - name: Commit and automatically push updated CSV dataset back to GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mauritania_all_data_jobs.csv
          git diff-index --quiet HEAD || git commit -m "Automated Daily Dataset Sync: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main