name: Daily Job Market Scraper Cron

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dataset-sync
  cancel-in-progress: false

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository code
        uses: actions/checkout@v4

      - name: Setup cloud Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install required scraping packages
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Execute your scraping engine
        run: python scraper.py

      - name: Commit and push updated CSV dataset back to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Automated Daily Dataset Sync: $(date +'%Y-%m-%d')"
          git fetch origin main
          git rebase -X ours origin/main
          git push origin main